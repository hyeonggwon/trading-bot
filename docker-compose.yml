services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
      - bot-state:/app/state
    environment:
      - LOG_DIR=/app/logs
      - STATE_FILE=/app/state/state.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "/app/scripts/healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    # Override CMD for live trading:
    # command: ["tradingbot", "live", "--strategy", "sma_cross", "--symbol", "BTC/KRW"]

volumes:
  bot-state:
